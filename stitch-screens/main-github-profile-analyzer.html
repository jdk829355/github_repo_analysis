<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg selection:bg-primary-container selection:text-on-primary-container">

<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight">GitHub 프로필 분석기</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">

            </p>
</div>
<!-- Input Section -->
<form class="w-full max-w-3xl flex flex-col sm:flex-row gap-sm items-center justify-center mt-lg relative">
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined">link</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-surface-container-lowest border border-outline rounded-lg text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 font-body-lg text-body-lg shadow-sm" id="github-url" name="github-url" placeholder="https://github.com/username" required="" type="url"/>
</div>
<button class="w-full sm:w-auto whitespace-nowrap bg-primary text-on-primary font-label-md text-label-md px-xl py-md rounded-lg hover:bg-primary-container hover:text-on-primary-container transition-colors duration-200 shadow-sm flex items-center justify-center gap-xs focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" type="submit">
<span>분석하기</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Optional Subtle Trust Indicators (Bento-style hint) -->
<div class="mt-24 grid grid-cols-1 md:grid-cols-3 gap-md w-full max-w-4xl opacity-80">
<div class="bg-surface-container-low p-margin rounded-xl border border-surface-variant flex flex-col items-center text-center gap-sm">
<span class="material-symbols-outlined text-primary text-[32px]">analytics</span>

<p class="font-body-md text-body-md text-on-surface-variant text-sm">커밋 히스토리와 기여도를 바탕으로 한 정밀한 인사이트 도출.</p>
</div>
<div class="bg-surface-container-low p-margin rounded-xl border border-surface-variant flex flex-col items-center text-center gap-sm">
<span class="material-symbols-outlined text-primary text-[32px]">code_blocks</span>
<h3 class="font-label-md text-label-md text-on-surface">스킬셋 매핑</h3>
